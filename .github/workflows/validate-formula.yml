name: Validate Formula
run-name: Validate formula for ${{ github.event.inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Expected agwiki version (e.g. 1.2.3)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Validate on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve expected version
        id: expected
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED="${{ github.event.inputs.version }}"
          EXPECTED="${EXPECTED#v}"
          echo "value=$EXPECTED" >> "$GITHUB_OUTPUT"
          echo "Expected version: $EXPECTED"

      - name: Tap local formula
        shell: bash
        run: |
          set -euo pipefail
          brew untap goagwiki/cli || true
          brew tap goagwiki/cli "$PWD"

      - name: Audit formula
        shell: bash
        run: brew audit --strict goagwiki/cli/agwiki

      - name: Install formula
        shell: bash
        run: |
          set -euo pipefail
          brew install --build-from-source goagwiki/cli/agwiki

      - name: Verify installed version
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED="${{ steps.expected.outputs.value }}"
          INSTALLED=$(agwiki --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9.-]+)?' | head -1)

          if [ -z "$INSTALLED" ]; then
            echo "Unable to parse installed agwiki version"
            agwiki --version
            exit 1
          fi

          if [ "$INSTALLED" != "$EXPECTED" ]; then
            echo "Version mismatch: expected $EXPECTED, got $INSTALLED"
            exit 1
          fi

          echo "Installed agwiki version matches expected: $INSTALLED"

      - name: Cleanup tap
        if: always()
        shell: bash
        run: brew untap goagwiki/cli || true
